name: CI

on:
  push:
    branches: [main, master, manish]
  pull_request:
    branches: [main, master, manish]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build doesn't need real secrets — Vite only checks syntax.
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          JWT_SECRET: "placeholder_secret_for_ci_build_only_32chars"
